name: Pre-Commit Checks

on:
  push:
   branches: [ main, develop ]
  pull_request:
   branches: [ main, develop ]

jobs:
  precommit:
    runs-on: ubuntu-latest
    name: Run Pre-Commit Checks

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Check for .pre-commit-config.yaml
        id: check_config
        run: |
          if [ -f ".pre-commit-config.yaml" ] || [ -f ".pre-commit-config.yml" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Run pre-commit (project config)
        if: steps.check_config.outputs.found == 'true'
        run: |
          echo "✅ Using repository's .pre-commit-config.yaml"
          pre-commit run --all-files --show-diff-on-failure --color=always

      - name: Create default pre-commit config
        if: steps.check_config.outputs.found == 'false'
        run: |
          echo "⚙️ No .pre-commit-config.yaml found — using default configuration."
          cat << 'EOF' > .pre-commit-config.yaml
          repos:
            - repo: https://github.com/pre-commit/pre-commit-hooks
              rev: v4.4.0
              hooks:
                - id: check-yaml
                  args: ["--allow-multiple-documents"]
                  exclude: ^manifest/charts/.*
                - id: end-of-file-fixer
                - id: trailing-whitespace
                - id: check-added-large-files
                - id: check-vcs-permalinks
                - id: check-symlinks
                - id: destroyed-symlinks
                - id: pretty-format-json

            - repo: https://github.com/TekWizely/pre-commit-golang
              rev: v1.0.0-rc.1
              hooks:
                - id: go-fmt
                  args: [-w]
                - id: go-mod-tidy

            - repo: https://github.com/psf/black
              rev: 23.9.1
              hooks:
                - id: black
                  args: [--line-length=88]

            - repo: https://github.com/PyCQA/isort
              rev: 5.12.0
              hooks:
                - id: isort
                  args: ["--profile=black"]

            - repo: https://github.com/pycqa/flake8
              rev: 6.1.0
              hooks:
                - id: flake8
                  args:
                    - --max-line-length=88
                    - --extend-ignore=E203,W503
                  additional_dependencies:
                    - flake8-bugbear
                    - flake8-comprehensions
                    - flake8-docstrings

            - repo: https://github.com/pycqa/pylint
              rev: v3.2.6
              hooks:
                - id: pylint
                  args: ["--disable=C0114,C0115,C0116"]
                  additional_dependencies:
                    - pylint-django
                    - pylint-flask

            - repo: https://github.com/thibaudcolas/pre-commit-stylelint
              rev: v15.10.3
              hooks:
                - id: stylelint
                  files: \.(css|scss)$
                  exclude: "node_modules/"
                  additional_dependencies:
                    - stylelint
                    - stylelint-config-standard
                  args: ['--config', '.stylelintrc.json', '--fix']

            - repo: https://github.com/codespell-project/codespell
              rev: v2.2.5
              hooks:
                - id: codespell
                  files: ^.*\.(py|c|h|md|rst|yml|go|sh|sql|tf|yaml)$
                  args: ["--ignore-words-list", "hist,nd"]

            - repo: https://github.com/gitleaks/gitleaks
              rev: v8.21.0
              hooks:
                - id: gitleaks
                  args: ["detect", "--verbose"]
                  verbose: true
          EOF

      - name: Run pre-commit (default config)
        if: steps.check_config.outputs.found == 'false'
        run: |
          pre-commit run --all-files --show-diff-on-failure --color=always